<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <title>Barriga Llena</title>
  </head>
  <body>
    <header class="header-container">
      <div class="BL-img">
        <img
          src="../imgs/BarrigaLlenaLogo.jpg"
          alt="Barriga Llena Logo"
          class="logo"
        />
        <div class="hamburger" id="hamburger">
          <span class="bar"></span>
          <span class="bar"></span>
          <span class="bar"></span>
        </div>
        <nav class="navbar" id="navbar">
          <ul>
            <li><a href="#">Home</a></li>
            <li><a href="#">Menu</a></li>
            <li><a href="#">About</a></li>
            <li><a href="#">Contact</a></li>
          </ul>
        </nav>
      </div>
      <div class="hero-content">
        <button class="order-btn">Order Now</button>
      </div>
    </header>
    <section class="menu">
      <h2>Our Menu</h2>
      <div class="menu-category">
        <h3>Tacos</h3>
        <div class="menu-item">
          <span>Carne Asada Taco</span>
          <span>$3.50</span>
        </div>
        <div class="menu-item">
          <span>Al Pastor Taco</span>
          <span>$3.50</span>
        </div>
      </div>

      <div class="menu-category">
        <h3>Burritos</h3>
        <div class="menu-item">
          <span>Regular Burrito</span>
          <span>$10.99</span>
        </div>
        <div class="menu-item">
          <span>Super Burrito</span>
          <span>$12.99</span>
        </div>
      </div>
    </section>
    <script src="script.js"></script>
  </body>
</html>
