<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link rel="icon" type="image/x-icon" href="imgs/BarrigaLlenaLogo.jpg" />
    <title>Barriga Llena</title>
  </head>
  <body>
    <header class="hero">
      <div class="overlay"></div>

      <nav class="navbar">
        <img
          src="imgs/BarrigaLlenaLogo.jpg"
          alt="Barriga Llena Logo"
          class="logo"
        />

        <ul>
          <li><a href="pages/locations.html">Locations + Menu</a></li>
          <li><a href="pages/contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="hero-content">
        <img
          src="imgs/BarrigaLlenaLogo.jpg"
          alt="Barriga Llena Logo"
          class="hero-logo"
        />

        <button
          class="order-btn"
          onclick="window.location.href = 'pages/locations.html'"
        >
          Order Now
        </button>
      </div>
    </header>
    <section class="gallery">
      <h2>AUTHENTIC, HAND-CRAFTED MEXICAN FOOD</h2>
      <div class="gallery-grid">
        <img src="imgs/menu_imgs/tacos_asada.jpg" alt="Tacos" />
        <img src="imgs/menu_imgs/super_burrito.jpg" alt="Burritos" />
        <img src="imgs/menu_imgs/huarache.jpg" alt="Huarache" />
        <img src="imgs/menu_imgs/chilaquiles.jpg" alt="Chilaquiles" />
        <img src="imgs/menu_imgs/chorizo_plate.jpg" alt="Chorizo Plate" />
        <img src="imgs/menu_imgs/multi_plates.jpg" alt="Multi Plates" />
        <img src="imgs/menu_imgs/horchata.jpg" alt="Horchata" />
        <img src="imgs/menu_imgs/jamaica.jpg" alt="Jamaica" />
        <img src="imgs/menu_imgs/jarritos.jpg" alt="Jarritos" />
      </div>
    </section>
    <hr />
    <footer class="footer">
      <img
        src="imgs/BarrigaLlenaLogo.jpg"
        alt="Barriga Llena Logo"
        class="footer-logo"
      />
      <p>&copy; 2026 Barriga Llena. All rights reserved.</p>
    </footer>
    <script src="script.js"></script>
  </body>
</html>
