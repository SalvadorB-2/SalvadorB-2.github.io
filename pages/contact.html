<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../style.css" />
    <link rel="icon" type="image/x-icon" href="../imgs/BarrigaLlenaLogo.jpg" />
    <title>Contact</title>
  </head>
  <body>
    <header class="contact-hero">
      <div class="overlay" id="overlay-2"></div>
      <nav class="navbar">
        <a href="../index.html">
          <img src="../imgs/BarrigaLlenaLogo.jpg" class="logo" alt="Logo" />
        </a>
        <ul>
          <li><a href="locations.html">Locations + Menu</a></li>
          <li><a href="contact.html">Contact</a></li>
        </ul>
      </nav>

      <div class="contact-hero-content">
        <h1>Contact Us</h1>
        <p>We'd love to hear from you!</p>
      </div>
    </header>
    <div class="contact-body">
      <section class="contact-section">
        <div class="contact-text">
          <h2>Get in Touch</h2>
          <p>Have questions or feedback?</p>
        </div>
        <form id="contact-form">
          <input type="text" id="name" placeholder="Name" required />
          <input type="email" id="email" placeholder="Email" required />
          <input type="tel" id="phone" placeholder="Phone Number" required />
          <textarea id="message" placeholder="Message" required></textarea>

          <button type="submit">Send Message</button>
        </form>
        <p id="contact-message">We will get back to you soon!</p>
      </section>
      <footer class="footer">
        <img
          src="../imgs/BarrigaLlenaLogo.jpg"
          alt="Barriga Llena Logo"
          class="footer-logo"
        />
        <p>&copy; 2026 Barriga Llena. All rights reserved.</p>
      </footer>
    </div>
    <script src="../script.js"></script>
  </body>
</html>
